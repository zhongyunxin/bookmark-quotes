<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인공지능 스마트 냉장고 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5" style="background-color: #fafafa;">
    <h1 class="mb-4 fw-bold text-success">냉장고를 부탁해 AI 🍎</h1>

    <div class="card card-body mb-4 shadow-sm">
        <h5 class="card-title fw-bold">① 식재료 등록</h5>
        <div class="row g-3">
            <div class="col-md-4">
                <input type="text" id="foodName" class="form-control" placeholder="식재료 이름 (예: 방울토마토)">
            </div>
            <div class="col-md-4">
                <select id="foodCategory" class="form-select">
                    <option value="정육/생선">정육/생선</option>
                    <option value="야채/과일">야채/과일</option>
                    <option value="유제품">유제품</option>
                    <option value="기타">기타</option>
                </select>
            </div>
            <div class="col-md-4">
                <input type="date" id="expiryDate" class="form-control">
            </div>
            <div class="col-12 text-end">
                <button onclick="addFood()" class="btn btn-success px-4">등록하기</button>
            </div>
        </div>
    </div>

    <div class="card card-body mb-4 shadow-sm">
        <h5 class="card-title fw-bold">② 현재 보관 중인 식재료</h5>
        <table class="table align-middle mt-3">
            <thead>
                <tr>
                    <th style="width: 10%">선택</th>
                    <th>이름</th>
                    <th>카테고리</th>
                    <th>유통기한</th>
                    <th>남은 기간</th>
                </tr>
            </thead>
            <tbody id="inventoryList">
                </tbody>
        </table>
        <button onclick="recommendRecipe()" class="btn btn-primary btn-lg w-100 mt-2">선택한 재료로 AI 레시피 추천받기 ✨</button>
    </div>

    <div id="recipeResult" class="card card-body shadow-sm d-none">
        <h5 class="card-title fw-bold text-primary">③ AI 추천 레시피 및 조리 타이머</h5>
        <div class="p-3 bg-light rounded mb-3" id="recipeContent"></div>
        
        <div class="border-top pt-3 text-center">
            <h6>⏱️ 추천 조리 타이머</h6>
            <h2 id="timerDisplay" class="fw-bold my-2 text-danger">02:00</h2>
            <button id="timerBtn" onclick="toggleTimer()" class="btn btn-outline-danger btn-sm">타이머 시작</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
